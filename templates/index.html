<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EILMS</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover no-repeat;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0);
    pointer-events: none;  /* ← FIX: Allows clicks to pass through */
    z-index: 0;
}

/* BUTTON */
.btn {
    position: relative;
    z-index: 1;
    padding: 16px;
    width: 200px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(to right, #2563eb, #1e40af);
    color: white;
    font-size: 18px;
    cursor: pointer;
}

.btn:hover {
    background: linear-gradient(to right, #1e40af, #1e3a8a);
}
</style>
</head>

<body>

<div style="text-align:center;">
    <h1 style="color:#0c00b3; font-size:0px; margin-bottom:-100px;">
        <img src="/static/images/base.png" alt="EILMS Logo" width="500" height="500">
    
    <h1 style="color:#0c00b3; font-size:20px; margin-bottom:10px;">
        EMPLOYEE INFORMATION & LEAVE MANAGEMENT SYSTEM
    </h1>

    <!-- ✅ FIXED BUTTON -->
    <button class="btn" onclick="window.location.href='/login'">
        Get Started
    </button>
</div>

</body>
</html>
