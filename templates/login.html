<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EILMS</title>

<style>
/* ✅ UPDATED BODY WITH NEW BACKGROUND */
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;

    /* 🌿 RELAXING ONLINE BACKGROUND */
    background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover no-repeat;
}

/* OVERLAY */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0.3);
    z-index: 0;
}

/* CARD */
.card {
    position: relative;
    z-index: 1;
    background: #f9f9f9;
    padding: 40px;
    width: 400px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    text-align: center;
}

/* HIDDEN */
.hidden {
    display: none;
}

/* HEADER */
.logo {
    font-size: 30px;
    font-weight: bold;
    color: #1e3a8a;
}

.subtitle {
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
}

h2 {
    color: #1e3a8a;
}

/* ROLE BUTTONS */
.role-buttons {
    display: flex;
    gap: 10px;
    margin: 20px 0;
}

.role-buttons button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #e5e7eb;
    font-weight: bold;
    cursor: pointer;
}

.role-buttons .active {
    background: linear-gradient(to right, #2563eb, #1e40af);
    color: white;
}

/* INPUT */
.input-box {
    position: relative;
    margin-bottom: 15px;
}

.input-box input {
    width: 100%;
    padding: 14px 40px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 15px;
    box-sizing: border-box;
}

.left-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
}

.right-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
}

/* OPTIONS */
.options {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-bottom: 10px;
}

/* BUTTON */
.btn, .login-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(to right, #2563eb, #1e40af);
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

.message {
    margin-top: 10px;
    font-size: 14px;
}

/* FOOTER */
.footer {
    margin-top: 15px;
    font-size: 13px;
    color: #555;
}
</style>
</head>

<body>

<!-- GET STARTED -->
<div id="startScreen" style="
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1;
">

    <h1 style="color:#1e3a8a; font-size:70px; margin-bottom:10px;">
        EILMS
    </h1>

    <p style="color:#555; font-size: larger; margin-bottom:30px;">
        Employee Information and Leave Management System
    </p>

    <button class="btn" onclick="startApp()" style="
        width: 200px;
        font-size: 18px;
        padding: 16px;
        border-radius: 12px;
    ">
        Get Started
    </button>

</div>

<!-- LOGIN -->
<div class="card hidden" id="loginScreen">

    <div class="logo">🎓 EILMS</div>
    <div class="subtitle">Employee Information and Leave Management System</div>

    <h2>Login</h2>

    <div class="role-buttons">
        <button id="adminBtn" class="active" onclick="setRole('admin')">Admin</button>
        <button id="employeeBtn" onclick="setRole('employee')">Employee</button>
    </div>

    <div class="input-box">
        <span class="left-icon">👤</span>
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-box">
        <span class="left-icon">🔒</span>
        <input type="password" id="password" placeholder="Password">
        <span class="right-icon" onclick="togglePassword()">👁️</span>
    </div>

    <div class="options">
        <label><input type="checkbox" id="remember"> Remember Me</label>
        <a href="#">Forgot Password?</a>
    </div>

    <button class="login-btn" onclick="login()">Login</button>

    <div class="message" id="message"></div>

    <div class="footer">© 2026 EILMS System</div>

</div>

<script>
let role = "admin";

function startApp() {
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("loginScreen").classList.remove("hidden");
}

function setRole(selected) {
    role = selected;

    document.getElementById("adminBtn").classList.remove("active");
    document.getElementById("employeeBtn").classList.remove("active");

    document.getElementById(selected + "Btn").classList.add("active");
}

function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if (!username || !password) {
        alert("Please fill all fields!");
        return;
    }

    // CREATE FORM DATA
    const formData = new URLSearchParams();
    formData.append("username", username);
    formData.append("password", password);

    // SEND TO FLASK
    const response = await fetch("/login", {
        method: "POST",
        body: formData
    });

    // REDIRECT HANDLED BY FLASK
    if (response.redirected) {
        window.location.href = response.url;
    } else {
        const text = await response.text();
        document.open();
        document.write(text);
        document.close();
    }
}
</script>

</body>
</html>
