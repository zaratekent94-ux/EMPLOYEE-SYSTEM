<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EILMS - Admin Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body { font-family: 'Inter', sans-serif; background-color: #f3f6f9; }
.sidebar { background-color: #1a233a; }
.nav-link { transition: 0.3s; cursor: pointer; }
.nav-link.active { background-color: #4382f6; }
.page-section { display: none; }
.page-section.active { display: block; }

/* ✅ Optional hover effect */
tr:hover { background-color: #e5e7eb; }
</style>
</head>

<body class="flex h-screen">

<!-- SIDEBAR -->
<aside class="sidebar w-64 text-white p-4 flex flex-col">
    <h1 class="text-2xl font-bold mb-6">EILMS</h1>

    <nav class="space-y-2">
        <div onclick="showPage('home', this)" class="nav-link active p-3 rounded">
            <i class="fas fa-home"></i> Home
        </div>

        <div onclick="showPage('add-employee', this)" class="nav-link p-3 rounded">
            <i class="fas fa-user-plus"></i> Add Employee
        </div>

        <div onclick="showPage('view-info', this)" class="nav-link p-3 rounded">
            <i class="fas fa-users"></i> View Info
        </div>

        <div onclick="showPage('leave-requests', this)" class="nav-link p-3 rounded">
            <i class="fas fa-file-signature"></i> Leave Requests
        </div>

        <div onclick="logout()" class="nav-link p-3 rounded">
            <i class="fas fa-sign-out-alt"></i> Logout
        </div>
    </nav>
</aside>

<!-- MAIN -->
<main class="flex-1 p-6 overflow-y-auto">

<!-- DASHBOARD -->
<section id="home" class="page-section active">
    <h1 class="text-2xl font-bold mb-6">Dashboard Overview</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-gradient-to-r from-blue-500 to-blue-700 text-white p-6 rounded-xl shadow-lg">
            <h2 class="font-bold">Employees</h2>
            <p class="text-3xl" id="employeeCount">0</p>
        </div>

        <div class="bg-gradient-to-r from-green-500 to-green-700 text-white p-6 rounded-xl shadow-lg">
            <h2 class="font-bold">Leave Requests</h2>
            <p class="text-3xl" id="leaveCount">0</p>
        </div>

        <div class="bg-gradient-to-r from-yellow-500 to-orange-500 text-white p-6 rounded-xl shadow-lg">
            <h2 class="font-bold">Reports</h2>
            <p class="text-3xl" id="reportCount">0</p>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
        <h2 class="font-bold mb-4">Recent Employees</h2>
        <table class="w-full">
            <tbody id="recentTable"></tbody>
        </table>
    </div>
</section>

<!-- ADD EMPLOYEE -->
<section id="add-employee" class="page-section">
    <div class="bg-white p-8 rounded-xl shadow max-w-3xl mx-auto">

        <h2 id="formTitle" class="text-xl font-bold mb-6 text-center">Create Employee</h2>

        <form id="employeeForm" method="POST" action="/create_employee" class="grid grid-cols-2 gap-4">

            <input type="text" name="name" id="form-name" placeholder="Full Name" class="border p-3 rounded" required>
            <input type="text" name="dept" id="form-dept" placeholder="Department" class="border p-3 rounded">

            <input type="text" name="position" id="form-pos" placeholder="Position" class="border p-3 rounded">
            <input type="text" name="phone" id="form-phone" placeholder="Contact" class="border p-3 rounded">

            <input type="text" name="username" id="form-username" placeholder="Username" class="border p-3 rounded" required>
            <input type="password" name="password" id="form-password" placeholder="Password" class="border p-3 rounded">

            <button class="col-span-2 bg-blue-600 text-white p-3 rounded font-bold">
                Save Employee
            </button>

        </form>
    </div>
</section>

<!-- VIEW -->
<section id="view-info" class="page-section">
    <div class="bg-white p-6 rounded-xl shadow">
        <div class="flex justify-between mb-4">
            <h2 class="text-xl font-bold">Employee List</h2>
            <input type="text" id="searchInput" placeholder="Search..." class="border p-2 rounded">
        </div>

        <!-- ✅ UPDATED TABLE -->
        <table class="w-full border-separate border-spacing-y-2">
            <thead>
                <tr class="bg-[#1f2a3a] text-white text-left">
                    <th class="p-4 rounded-l-lg">Name</th>
                    <th class="p-4">Dept</th>
                    <th class="p-4">Position</th>
                    <th class="p-4">Contact</th>
                    <th class="p-4 rounded-r-lg">Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</section>

<!-- LEAVE REQUESTS -->
<section id="leave-requests" class="page-section">
    <h2 class="text-xl font-bold mb-4">Leave Requests</h2>

    <table class="w-full bg-white shadow rounded">
        <thead class="bg-gray-800 text-white">
            <tr class="text-center">
                <th class="p-3">Employee</th>
                <th class="p-3">Reason</th>
                <th class="p-3">Status</th>
                <th class="p-3">Action</th>
            </tr>
        </thead>
        <tbody id="leaveTable" class="text-center"></tbody>
    </table>
</section>

</main>

<script>

function logout() {
    if (confirm("Logout?")) window.location.href = "/logout";
}

function showPage(id, el) {
    document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
}

async function loadEmployees() {
    const res = await fetch("/get_employees");
    const data = await res.json();

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    data.forEach(emp => {
        tbody.innerHTML += `
        <tr class="bg-gray-100 shadow-sm">
            <td class="p-4 rounded-l-lg">${emp[1]}</td>
            <td class="p-4">${emp[2]}</td>
            <td class="p-4">${emp[3]}</td>
            <td class="p-4">${emp[4]}</td>
            <td class="p-4 rounded-r-lg space-x-2">
                <button onclick="editEmployee('${emp[0]}','${emp[1]}','${emp[2]}','${emp[3]}','${emp[4]}')" 
                    class="bg-yellow-500 px-3 py-1 text-white rounded">Edit</button>
                <button onclick="deleteEmployee('${emp[0]}')" 
                    class="bg-red-500 px-3 py-1 text-white rounded">Delete</button>
            </td>
        </tr>`;
    });

    document.getElementById("employeeCount").innerText = data.length;
}

////////////////////////////////////////////////////
async function loadLeaves() {
    const res = await fetch("/get_all_leaves");
    const data = await res.json();

    const table = document.getElementById("leaveTable");
    table.innerHTML = "";

    data.forEach(item => {
        table.innerHTML += `
        <tr class="border-b">
            <td class="p-3">${item[1]}</td>
            <td class="p-3">${item[2]}</td>
            <td class="p-3 font-bold ${
                item[3] === 'Pending' ? 'text-yellow-500' :
                item[3] === 'Approved' ? 'text-green-500' :
                'text-red-500'
            }">${item[3]}</td>
            <td class="p-3 space-x-2">
                <button onclick="updateLeave(${item[0]}, 'Approved')" class="bg-green-500 text-white px-2 py-1 rounded">Approve</button>
                <button onclick="updateLeave(${item[0]}, 'Rejected')" class="bg-red-500 text-white px-2 py-1 rounded">Reject</button>
            </td>
        </tr>`;
    });

    document.getElementById("leaveCount").innerText = data.length;
}

async function updateLeave(id, status) {
    const res = await fetch("/update_leave_status", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id, status })
    });

    const data = await res.json();
    alert(data.message);
    loadLeaves();
}

window.onload = function() {
    loadEmployees();
    loadLeaves();
};

</script>

</body>
</html>
